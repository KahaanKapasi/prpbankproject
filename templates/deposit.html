{% extends "base.html" %}

{% block title %} — Deposit{% endblock %}

{% block page_title %}<h1>Deposit</h1>{% endblock %}

{% block content %}
<div class="mb-16">
  <span class="balance-chip">Balance: {{ user.balance|inr }}</span>
</div>

<div class="form-page">
  <div class="card inst-card">
    <div class="inst-card-body">
      <form method="POST">
        <div class="form-group">
          <label for="amount">Amount</label>
          <input type="number" id="amount" name="amount" placeholder="Enter amount" step="0.01" min="1" required>
        </div>
        <button type="submit" class="btn btn-success btn-block">Deposit Funds</button>
      </form>
    </div>
  </div>
</div>
<script>function setAmount(v){document.querySelector('[name=amount]').value=v}</script>
{% endblock %}
