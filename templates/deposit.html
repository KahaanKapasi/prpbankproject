{% extends "base.html" %}
{% block title %} — Deposit{% endblock %}
{% block page_title %}<h1>Deposit Money</h1>{% endblock %}

{% block content %}
<div class="form-page">
  <div class="card form-card">
    <div class="balance-chip">
      Current Balance: <strong>₹{{ "%.2f"|format(user.balance) }}</strong>
    </div>
    <form method="POST">
      <div class="form-group">
        <label>Amount (₹)</label>
        <input type="number" name="amount" step="0.01" min="1" placeholder="0.00" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Deposit Funds</button>
    </form>
  </div>
</div>
{% endblock %}
