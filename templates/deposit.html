{% extends "base.html" %}
{% block title %} — Deposit{% endblock %}
{% block page_title %}<h1>Deposit Money</h1>{% endblock %}

{% block content %}
<div class="form-page">
  <div class="card form-card">
    <div class="balance-chip">
      Current Balance: <strong>₹{{ "%.2f"|format(user.balance) }}</strong>
    </div>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>Amount (₹)</label>
        <input type="number" name="amount" step="0.01" min="1" placeholder="0.00" required autofocus>
      </div>
      <div class="quick-amounts">
        <button type="button" class="btn btn-ghost btn-sm" onclick="setAmount(500)">₹500</button>
        <button type="button" class="btn btn-ghost btn-sm" onclick="setAmount(1000)">₹1,000</button>
        <button type="button" class="btn btn-ghost btn-sm" onclick="setAmount(5000)">₹5,000</button>
        <button type="button" class="btn btn-ghost btn-sm" onclick="setAmount(10000)">₹10,000</button>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Deposit Funds</button>
    </form>
  </div>
</div>
<script>function setAmount(v){document.querySelector('[name=amount]').value=v}</script>
{% endblock %}
